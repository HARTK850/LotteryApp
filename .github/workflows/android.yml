name: Build APK (No Wrapper Needed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2  # גרסה תואמת ל-AGP 8.2.0 מה-build.gradle שלך

    - name: Install Android SDK components
      uses: android-actions/setup-android@v3

    - name: Accept SDK licenses and install platforms
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "platforms;android-19" "platform-tools"

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lottery-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
