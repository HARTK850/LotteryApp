name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.0   # ← שנה ל-8.0 (מתאים יותר ל-AGP 8.1)

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK platforms
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "platforms;android-19"

    - name: Build APK
      run: gradle assembleDebug --stacktrace --no-daemon --refresh-dependencies

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lottery-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
