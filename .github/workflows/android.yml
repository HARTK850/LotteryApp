name: Build APK - Simple

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11  # ← JDK 11 יציב עם AGP 7.4
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses + install old + new platforms
      run: |
        yes | sdkmanager --licenses
        sdkmanager --update
        sdkmanager "platforms;android-19" "platforms;android-33" "build-tools;33.0.2" "platform-tools"

    - name: Build APK
      run: |
        chmod +x ./gradlew || true  # אם יש wrapper – לא נכשל
        ./gradlew assembleDebug --stacktrace || gradle :app:assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: app/build/outputs/apk/debug/*.apk
